# Configuração de turma — copie este arquivo para cada turma/período.
# Uso: ./scripts/criar-repos-alunos.sh 01-cartao-curso turmas/pweb1-2026.1-911a.conf

ORG=engsoft-ifal          # organização do GitHub
DISCIPLINA=pweb1          # prefixo da disciplina
PERIODO=2026.1            # ano.semestre
TURMA=911a                # identificador da turma

# publico  -> Actions ilimitado e grátis + portfólio do aluno, MAS um aluno vê a
#             solução do outro (risco de plágio).
# privado  -> isolado, porém consome a cota de Actions da organização
#             (3.000 min/mês no plano Team).
VISIBILIDADE=publico

ALUNOS=pweb1-2026.1-911a.alunos.txt   # relativo a este arquivo
